name: Tests (Tier 1 + 2)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Tier 1 unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short -q

      - name: Run Tier 2 DAWG conformance (pyoxigraph)
        run: |
          python -m pytest tests/conformance/test_dawg_pyoxigraph.py -v --tb=short -q

      - name: Run pglast SQL validation (if available)
        run: |
          python -m pytest tests/unit/sparql_sql/test_emit_pipeline.py -v --tb=short -q
        continue-on-error: true
