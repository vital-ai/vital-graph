[main]
# Development
ssl.enabled = false 

# Fix for Fuseki 5.6.0 SessionManager issue
statelessSessionManager = org.apache.shiro.web.session.mgt.DefaultWebSessionManager
securityManager.sessionManager = $statelessSessionManager

plainMatcher=org.apache.shiro.authc.credential.SimpleCredentialsMatcher
iniRealm.credentialsMatcher = $plainMatcher

localhostFilter=org.apache.jena.fuseki.authz.LocalhostFilter

[users]
# Format: username=password
admin=admin123
vitalgraph_user=vitalgraph_pass
readonly_user=readonly_pass

[roles]

[urls]
## Control functions open to anyone
/$/status  = anon
/$/server  = anon
/$/ping    = anon
/$/metrics = anon

## Dataset operations - require authentication
/vitalgraph/sparql = authcBasic
/vitalgraph/update = authcBasic
/vitalgraph/data = authcBasic
/vitalgraph/** = authcBasic

## Admin operations - require authentication
/$/** = authcBasic

## Everything else - require authentication
/** = authcBasic
